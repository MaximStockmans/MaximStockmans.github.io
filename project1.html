<script>
    $(document).ready(function() {
    $('#footer-placeholder').load("footer.html");
});
</script>
<script>
    $(document).ready(function() {
        setInterval(function() {
            var docHeight = $(window).height();
            var footerHeight = $('#footer-placeholder').outerHeight();
            var footerTop = $('#footer-placeholder').position().top + footerHeight;
            var marginTop = (docHeight - footerTop + 0);

            if (footerTop < docHeight)
                $('#footer-placeholder').css('margin-top', marginTop + 'px'); // padding of 30 on footer
            else
                $('#footer-placeholder').css('margin-top', '0px');
            // console.log("docheight: " + docHeight + "\n" + "footerheight: " + footerHeight + "\n" + "footertop: " + footerTop + "\n" + "new docheight: " + $(window).height() + "\n" + "margintop: " + marginTop);
        }, 250);
    });
</script>
